name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  firmware-unit:
    name: pio test (native_posix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: install platformio
        run: pip install platformio
      - name: run unit tests
        run: pio test -e native_posix

  mellon-proto:
    name: cargo test (mellon-proto)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: mobile
      - run: cargo test -p mellon-proto
