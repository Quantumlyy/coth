# Zephyr project configuration for Mellon firmware.
# See spec §4.2.

# --- Bluetooth ---
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Mellon"
CONFIG_BT_DEVICE_APPEARANCE=0
CONFIG_BT_SMP=y
CONFIG_BT_FIXED_PASSKEY=y
CONFIG_BT_BONDABLE=y
CONFIG_BT_SETTINGS=y
CONFIG_BT_NUS=y
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=4

# --- Storage ---
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_FCB=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# --- Logging (RTT only — no UART console; UART is the OSDP wire) ---
CONFIG_LOG=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_UART=n
CONFIG_LOG_PRINTK=y
CONFIG_LOG_MODE_DEFERRED=y

# --- Crypto ---
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_CIPHER_AES_ENABLED=y
CONFIG_MBEDTLS_CIPHER_MODE_CBC_ENABLED=y
CONFIG_MBEDTLS_AES_ROM_TABLES=y

# --- Power management — keep BLE radio always reachable per §7.4 ---
CONFIG_PM=y
CONFIG_PM_DEVICE=y

# --- Serial / UART for the OSDP bus ---
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_ASYNC_API=y
CONFIG_UART_LINE_CTRL=n

# --- GPIO for DE/RE̅ direction line and LEDs ---
CONFIG_GPIO=y

# --- Watchdog (M2 acceptance: 30 minutes without watchdog reset) ---
CONFIG_WATCHDOG=y
CONFIG_WDT_NRFX=y

# --- Heap / stack ---
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
