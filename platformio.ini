; Mellon firmware — PlatformIO project configuration.
; Hardware: Bishop Fox Mellon v0.1 (Raytac MDBT42Q-512KV2 / nRF52832).
; Programming: SWD via J-Link or CMSIS-DAP.

[platformio]
default_envs = mellon
boards_dir = boards
test_dir = tests/unit
description = Mellon OSDP attack tool firmware (passive sniffer + capture).

[env:mellon]
platform = nordicnrf52
board = mellon
framework = zephyr
upload_protocol = jlink
debug_tool = jlink
monitor_speed = 115200
build_src_filter = +<*>
build_flags =
    -DCONFIG_BT=y
    -DCONFIG_BT_PERIPHERAL=y
    -DMELLON_FIRMWARE_VERSION=\"0.1.0-dev\"
    !python -c "import subprocess;print('-DMELLON_BUILD_HASH=\\\"' + subprocess.check_output(['git','rev-parse','--short','HEAD']).decode().strip() + '\\\"')"
extra_scripts =
build_unflags =

; Host-runnable unit tests. Framer, CRC, weak-key candidate generator,
; AES-CBC trial decrypt, capture FCB simulation. No BLE, no hardware.
[env:native_posix]
platform = native
test_framework = unity
build_src_filter = -<*>
build_flags =
    -std=c11
    -Wall
    -Wextra
    -Wno-unused-parameter
    -DMELLON_HOST_TEST=1
    -I src
